name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: claude
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail

            cd ~/scripts/BB-Program-Monitoring

            echo "[+] Syncing repo to origin/main..."
            git fetch origin
            git reset --hard origin/main

            echo "[+] Building Docker image..."
            docker build -t bb-program-monitoring .

            echo "[+] Cleaning old Docker layers..."
            docker image prune -f

            echo "[+] Deploy complete."

            echo "[TEST] Intentionally failing GitHub Action..."
            exit 1

      - name: Notify Discord on failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
            -d '{"content":"🚨 **BB Program Monitoring deploy failed** in GitHub Actions. Check the Actions logs."}' \
            "${{ secrets.DISCORD_CHANGE_WEBHOOK_URL }}"